# config/fall-detection-ntu/balanced.yaml
# Fall Detection — BlockGCN — NTU RGB+D 25-Joint — Versi BALANCED
#
# Dataset: NTU RGB+D .skeleton → 25 joint, 2 kelas (fall / not-fall)
#   Fall    (label 1): A043
#   Not-fall(label 0): A008, A009, A027, A042
#
# Train: python main.py --config config/fall-detection-ntu/balanced.yaml \
#                       --work-dir work_dir/fall_ntu25_balanced --device 0
# Test : python main.py --config config/fall-detection-ntu/balanced.yaml \
#                       --phase test \
#                       --weights work_dir/fall_ntu25_balanced/runs-XX-XXXX.pt \
#                       --work-dir work_dir/fall_ntu25_balanced

work_dir: work_dir/fall_ntu25_balanced
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 25
  num_person: 1
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
base_lr: 0.01
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [110, 120]
warm_up_epoch: 5

num_epoch: 140
start_epoch: 0
batch_size: 16
test_batch_size: 16

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_ntu_binary.Feeder
num_worker: 0

train_feeder_args:
  data_path: dataset/ntu25_data/balanced/joint/train_data.npy
  label_path: dataset/ntu25_data/balanced/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True # 3D rotation (yaw/pitch/roll)
  random_shift: True # random translation
  random_flip: True # horizontal flip + joint swap
  random_speed: True # temporal resampling
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: dataset/ntu25_data/balanced/joint/val_data.npy
  label_path: dataset/ntu25_data/balanced/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False

