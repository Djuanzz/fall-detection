# config/fall-detection-ntu/colab_full.yaml
# Fall Detection — BlockGCN — NTU RGB+D 25-Joint — COLAB (A100) — FULL
#
# Dataset: NTU RGB+D .skeleton → 25 joint, 2 kelas (fall / not-fall)
# Menggunakan SEMUA sampel + class weight untuk menangani imbalance.
#
# PENTING: Set loss_args.weight sesuai nilai dari dataset_info.json
#   cat /content/drive/MyDrive/Fall-Detection/dataset/ntu25_data/full/joint/dataset_info.json
#   Lihat field "class_weight_for_config" → weight: [1.0, X.X]
#
# Struktur Google Drive yang diharapkan:
#   /content/drive/MyDrive/Fall-Detection/
#     ├── dataset/ntu25_data/full/joint/train_data.npy
#     ├── dataset/ntu25_data/full/joint/train_label.pkl
#     ├── dataset/ntu25_data/full/joint/val_data.npy
#     ├── dataset/ntu25_data/full/joint/val_label.pkl
#     └── work_dir/fall_ntu25_full/
#
# Train: python main.py --config config/fall-detection-ntu/colab_full.yaml
# Test : python main.py --config config/fall-detection-ntu/colab_full.yaml \
#          --phase test \
#          --weights /content/drive/MyDrive/Fall-Detection/work_dir/fall_ntu25_full/runs-XX-XXXX.pt

work_dir: /content/drive/MyDrive/Fall-Detection/work_dir/fall_ntu25_full
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN_Base.Model
model_args:
  num_class: 2
  num_point: 25
  num_person: 1
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.5
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args:
  weight: [1.0, 4.15]

optimizer: SGD
base_lr: 0.005
momentum: 0.9
nesterov: True
weight_decay: 0.001
lr_decay_rate: 0.1
step: [10, 20]
warm_up_epoch: 3

num_epoch: 80
start_epoch: 0
batch_size: 32
test_batch_size: 32

log_interval: 20
save_interval: 1
save_epoch: 5
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_ntu_binary.Feeder
# num_worker > 2 sering deadlock di Colab
num_worker: 2

train_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu25_data/full/joint/train_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu25_data/full/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: True
  normalization: False
  debug: False
  use_mmap: True

test_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu25_data/full/joint/val_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu25_data/full/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: True

alpha: False

