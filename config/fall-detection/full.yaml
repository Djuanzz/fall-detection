# config/fall_detection/full.yaml
# ==================================
# Fall Detection — BlockGCN — VERSI FULL + CLASS WEIGHT
# Semua data dipakai, ketidakseimbangan diatasi lewat loss weight
#
# WAJIB: Cek dataset_info.json lalu update loss_args.weight:
#   Windows: type dataset\ntu_data\full\joint\dataset_info.json
#   Lihat "class_weight_for_config" → masukkan nilainya ke weight di bawah
#
# Train: python main.py --config config/fall_detection/full.yaml
# Test : python main.py --config config/fall_detection/full.yaml
#          --phase test --weights work_dir/fall_full/runs-XX-XXXX.pt

work_dir: work_dir/fall_full
phase: train
seed: 1
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0
  adaptive: True
  alpha: False

weights: null
ignore_weights: []

# Update angka [1.0, X] dari field "class_weight_for_config" di dataset_info.json
loss: CrossEntropyLoss
loss_args:
  weight: [1.0, 4.0]

optimizer: SGD
base_lr: 0.1
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [35, 55]
warm_up_epoch: 5

num_epoch: 65
start_epoch: 0
batch_size: 16
test_batch_size: 16

log_interval: 100
save_interval: 5
save_epoch: 10
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
num_worker: 4

train_feeder_args:
  data_path: dataset/ntu_data/full/joint/train_data.npy
  label_path: dataset/ntu_data/full/joint/train_label.pkl
  split: train
  window_size: 30
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  normalization: False
  debug: False
  use_mmap: True

test_feeder_args:
  data_path: dataset/ntu_data/full/joint/val_data.npy
  label_path: dataset/ntu_data/full/joint/val_label.pkl
  split: val
  window_size: 30
  p_interval: [0.95, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  normalization: False
  debug: False
  use_mmap: True

alpha: False

