# config/fall-detection/colab_full.yaml
# Fall Detection — BlockGCN — VERSI COLAB (A100) — FULL DATA + CLASS WEIGHT
# ─────────────────────────────────────────────────────────────────────────────
# Pakai semua data training (~2,952 samples), tidak di-undersample.
# Ketidakseimbangan kelas (non-fall >> fall, rasio ~4:1) diatasi via loss weight.
#
# PENTING: Sebelum training, cek dataset_info.json untuk pos_weight yang tepat:
#   /content/drive/MyDrive/Fall-Detection/dataset/ntu_data/full/joint/dataset_info.json
#   field "class_weight_for_config" → masukkan ke loss_args.weight di bawah.
#
# Perbandingan dengan balanced:
#   balanced : train=1,120  (undersample) | batch=8 → ~140 batches/epoch
#   full     : train=~2,952 (semua data)  | batch=8 → ~369 batches/epoch
#
# Train: python main.py --config config/fall-detection/colab_full.yaml
# Test : python main.py --config config/fall-detection/colab_full.yaml
#          --phase test --weights /content/drive/MyDrive/Fall-Detection/work_dir/fall_full/runs-XX-XXXX.pt

work_dir: /content/drive/MyDrive/Fall-Detection/work_dir/fall_full
phase: train
seed: 42
print_log: True
save_score: True

# ── Device ────────────────────────────────────────────────────────────────────
device: [0]

# ── Model ─────────────────────────────────────────────────────────────────────
model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False

weights: null
ignore_weights: []

# ── Loss ──────────────────────────────────────────────────────────────────────
# weight: [1.0, pos_weight] — pos_weight dari dataset_info.json
# Contoh: rasio non-fall:fall = 4.3 → weight: [1.0, 4.3]
# Update angka ini setelah cek dataset_info.json!
loss: CrossEntropyLoss
loss_args:
  weight: [1.0, 4.3]

# ── Optimizer ─────────────────────────────────────────────────────────────────
optimizer: SGD
base_lr: 0.1
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [50, 70]
warm_up_epoch: 5

# ── Training ──────────────────────────────────────────────────────────────────
# batch_size=8 sama seperti original GitHub untuk konsistensi eksperimen
num_epoch: 90
start_epoch: 0
batch_size: 8
test_batch_size: 8

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

# ── Feeder ────────────────────────────────────────────────────────────────────
feeder: feeders.feeder_yolo.Feeder
num_worker: 2

train_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu_data/full/joint/train_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu_data/full/joint/train_label.pkl
  split: train
  window_size: 150
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  normalization: False
  debug: False
  use_mmap: True

test_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu_data/full/joint/val_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/ntu_data/full/joint/val_label.pkl
  split: val
  window_size: 150
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  normalization: False
  debug: False
  use_mmap: True

alpha: False
