# config/fall-detection-yolo/full_fixed.yaml
# Fall Detection — BlockGCN_Base — YOLO17 — FULL DATASET FIXED
#
# Masalah pada 04_17ful (log weights_base/04_17ful):
#   - Dataset "full" = imbalanced training → dual collapse (all-fall & all-non-fall)
#   - batch_size=8 → gradient noise + batch imbalance ekstrem
#   - Tidak ada class weighting → model biased ke majority (non-fall)
#   - step=[60,70] terlambat → model stuck setelah decay
#   - BlockGCN_Base lebih sensitif: instabil mulai epoch 9 vs epoch 20
#
# Fix yang diterapkan:
#   1. batch_size 8→32       : kurangi gradient noise, batch lebih representatif
#   2. class weight [1,4]    : PENTING — kompensasi imbalance non-fall:fall ~4:1
#   3. step [60,70]→[10,20]  : decay SEBELUM instabil epoch 9 (best epoch 7!)
#   4. base_lr 0.01→0.005    : lebih konservatif karena best epoch sangat awal
#   5. weight_decay 4e-4→1e-3: regularisasi lebih kuat
#   6. drop_out 0.3→0.5      : regularisasi tambahan (Base lebih rentan overfit)
#   7. random_noise=True      : augmentasi tambahan
#   8. label_smoothing=0.1   : cegah logit ekstrem
#   9. num_epoch 80→40       : best epoch 7, tidak perlu sampai 80
#
# Train: python main.py --config config/fall-detection-yolo/full_fixed.yaml --device 0

work_dir: work_dir/fall_yolo17_full_fixed
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN_Base.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.5
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

# Class weight [non-fall, fall] = [1.0, 4.1]
# Val ratio: 1086:265 ≈ 4.1:1
# Tanpa ini model biased ke non-fall → epoch 50 sensitivity 22%
loss: CrossEntropyLoss
loss_args:
  weight: [1.0, 4.1]

optimizer: SGD
base_lr: 0.005
momentum: 0.9
nesterov: True
weight_decay: 0.001
lr_decay_rate: 0.1
step: [10, 20]
warm_up_epoch: 3

num_epoch: 80
start_epoch: 0
batch_size: 32
test_batch_size: 32

log_interval: 20
save_interval: 1
save_epoch: 5
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
num_worker: 0

train_feeder_args:
  data_path: dataset/yolo17_data/full/joint/train_data.npy
  label_path: dataset/yolo17_data/full/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: True
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: dataset/yolo17_data/full/joint/val_data.npy
  label_path: dataset/yolo17_data/full/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False
