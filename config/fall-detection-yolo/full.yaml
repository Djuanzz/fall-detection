# config/fall-detection-yolo/full.yaml
# Fall Detection — BlockGCN — YOLO11n-pose 17-Joint — Versi FULL
#
# UPDATE loss_args.weight dari dataset/yolo17_data/full/joint/dataset_info.json
# Field: "class_weight_for_config"

work_dir: work_dir/fall_yolo17_full
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args:
  # Diisi setelah prepare_dataset_yolo17.py selesai:
  # cat dataset/yolo17_data/full/joint/dataset_info.json | grep class_weight
  weight: [1.0, 4.0]

optimizer: SGD
base_lr: 0.1
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [50, 70]
warm_up_epoch: 5

num_epoch: 90
start_epoch: 0
batch_size: 8
test_batch_size: 8

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
num_worker: 0

train_feeder_args:
  data_path: dataset/yolo17_data/full/joint/train_data.npy
  label_path: dataset/yolo17_data/full/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: dataset/yolo17_data/full/joint/val_data.npy
  label_path: dataset/yolo17_data/full/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False

