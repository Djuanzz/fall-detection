# config/fall-detection-yolo/colab_balanced.yaml
# Fall Detection — BlockGCN — YOLO11n-pose 17-Joint — COLAB (A100) — BALANCED
#
# Struktur Google Drive yang diharapkan:
#   /content/drive/MyDrive/Fall-Detection/
#     ├── dataset/yolo17_data/balanced/joint/train_data.npy
#     ├── dataset/yolo17_data/balanced/joint/train_label.pkl
#     ├── dataset/yolo17_data/balanced/joint/val_data.npy
#     ├── dataset/yolo17_data/balanced/joint/val_label.pkl
#     └── work_dir/fall_yolo17_balanced/
#
# Train: python main.py --config config/fall-detection-yolo/colab_balanced.yaml
# Test : python main.py --config config/fall-detection-yolo/colab_balanced.yaml \
#          --phase test \
#          --weights /content/drive/MyDrive/Fall-Detection/work_dir/fall_yolo17_balanced/runs-XX-XXXX.pt

work_dir: /content/drive/MyDrive/Fall-Detection/work_dir/fall_yolo17_balanced
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
base_lr: 0.01
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [110, 120]
warm_up_epoch: 5

num_epoch: 140
start_epoch: 0
batch_size: 8
test_batch_size: 8

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
# num_worker > 2 sering deadlock di Colab
num_worker: 2

train_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/yolo17_data/balanced/joint/train_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/yolo17_data/balanced/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: False
  normalization: True
  debug: False
  use_mmap: True

test_feeder_args:
  data_path: /content/drive/MyDrive/Fall-Detection/dataset/yolo17_data/balanced/joint/val_data.npy
  label_path: /content/drive/MyDrive/Fall-Detection/dataset/yolo17_data/balanced/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: True
  debug: False
  use_mmap: True

alpha: False
