# config/fall-detection-yolo/balanced_fixed.yaml
# Fall Detection — BlockGCN — YOLO17 — FIXED CONFIG
#
# Masalah pada training sebelumnya (log weights_base/03_17bal):
#   - batch_size=8 terlalu kecil → gradient noise → collapse epoch 20,23,35
#   - step=[60,70] terlambat → model stuck setelah decay
#   - Tidak ada label smoothing → logit extrem → prediksi semua "fall"
#
# Fix yang diterapkan:
#   1. batch_size 8→32       : gradient stabil, tidak ada mode switching
#   2. step [60,70]→[20,35]  : decay SEBELUM collapse epoch 20
#   3. label_smoothing=0.1   : cegah logit ekstrem → tidak collapse ke all-fall
#   4. weight_decay 4e-4→1e-3: regularisasi lebih kuat
#   5. drop_out 0.3→0.4      : regularisasi tambahan
#   6. random_noise=True     : augmentasi tambahan untuk dataset kecil
#
# Train: python main.py --config config/fall-detection-yolo/balanced_fixed.yaml --device 0

work_dir: work_dir/fall_yolo17_balanced
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.4
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
base_lr: 0.01
momentum: 0.9
nesterov: True
weight_decay: 0.001
lr_decay_rate: 0.1
step: [20, 35]
warm_up_epoch: 5

num_epoch: 60
start_epoch: 0
batch_size: 32
test_batch_size: 32

log_interval: 20
save_interval: 1
save_epoch: 15
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
num_worker: 0

train_feeder_args:
  data_path: dataset/yolo17_data/balanced/joint/train_data.npy
  label_path: dataset/yolo17_data/balanced/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: True
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: dataset/yolo17_data/balanced/joint/val_data.npy
  label_path: dataset/yolo17_data/balanced/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False

