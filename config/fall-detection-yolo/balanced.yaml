# config/fall-detection-yolo/balanced.yaml
# Fall Detection — BlockGCN — YOLO11n-pose 17-Joint — Versi BALANCED
#
# Untuk apple-to-apple comparison dengan NTU 25-joint:
#   - Model: BlockGCN identik, bedanya num_point=17 vs 25
#   - Hyperparameter: SAMA dengan config/fall-detection-ntu/balanced.yaml
#   - Augmentasi: feeder_yolo.Feeder (2D + confidence)
#
# Perbedaan parameter model (~84K):
#   unit_gcn.fc1  : (3,8,17,17)×10 = 69,360  vs  (3,8,25,25)×10 = 150,000  [Δ=80,640]
#   data_bn       : BN(2176)         vs  BN(3200)                              [Δ=2,048]
#   pos_embedding : (1,17,128)       vs  (1,25,128)                            [Δ=1,024]
#   rpe           : (3,8,max_hop+1)×10 — berbeda karena topologi graph berbeda [Δ~700]
#   Total         : ~1.20M           vs  ~1.30M
#
# Train: python main.py --config config/fall-detection-yolo/balanced.yaml \
#                       --work-dir work_dir/fall_yolo17_balanced --device 0

work_dir: work_dir/fall_yolo17_balanced
phase: train
seed: 42
print_log: True
save_score: True

device: [0]

model: model.BlockGCN.Model
model_args:
  num_class: 2
  num_point: 17
  num_person: 1
  graph: graph.yolo.Graph
  graph_args:
    labeling_mode: spatial
  in_channels: 3
  drop_out: 0.3
  adaptive: True
  alpha: False
  window_size: 64

weights: null
ignore_weights: []

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
base_lr: 0.01
momentum: 0.9
nesterov: True
weight_decay: 0.0004
lr_decay_rate: 0.1
step: [110, 120]
warm_up_epoch: 5

num_epoch: 140
start_epoch: 0
batch_size: 16
test_batch_size: 16

log_interval: 20
save_interval: 1
save_epoch: 30
eval_interval: 1
show_topk: [1]

feeder: feeders.feeder_yolo.Feeder
num_worker: 0

train_feeder_args:
  data_path: dataset/yolo17_data/balanced/joint/train_data.npy
  label_path: dataset/yolo17_data/balanced/joint/train_label.pkl
  split: train
  window_size: 64
  p_interval: [0.5, 1.0]
  random_move: True
  random_shift: True
  random_flip: True
  random_speed: True
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

test_feeder_args:
  data_path: dataset/yolo17_data/balanced/joint/val_data.npy
  label_path: dataset/yolo17_data/balanced/joint/val_label.pkl
  split: val
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  debug: False
  use_mmap: False

alpha: False
